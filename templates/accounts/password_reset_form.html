{% extends "base.html" %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card fcu-card">
      <div class="card-header">Reset Your Password</div>
      <div class="card-body">
        <p class="text-muted">Enter the email address on your account and we'll send a link to reset your password.</p>
        <form method="post">
          {% csrf_token %}
          {{ form.email }}
          <button type="submit" class="btn btn-fcu-primary w-100 mt-3">Send Reset Link</button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
