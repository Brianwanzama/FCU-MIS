{% extends "base.html" %}
{% block title %}Set New Password{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card fcu-card">
      <div class="card-header">Set a New Password</div>
      <div class="card-body">
        {% if validlink %}
        <form method="post">
          {% csrf_token %}
          {{ form.new_password1 }}
          <div class="mt-2"></div>
          {{ form.new_password2 }}
          <button type="submit" class="btn btn-fcu-primary w-100 mt-3">Set Password</button>
        </form>
        {% else %}
        <div class="alert alert-danger">This password reset link is invalid or has expired.</div>
        {% endif %}
      </div>
    </div>
  </div>
</div>
{% endblock %}
